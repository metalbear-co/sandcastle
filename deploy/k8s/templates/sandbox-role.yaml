{{- if .Values.sandbox.k8s.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sandcastle.fullname" . }}
  namespace: {{ .Values.sandbox.k8s.namespace }}
  labels:
    {{- include "sandcastle.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
{{- end }}
