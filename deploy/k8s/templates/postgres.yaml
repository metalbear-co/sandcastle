{{- if .Values.postgresql.enabled }}
{{- $fullname := include "sandcastle.fullname" . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-postgres
  labels:
    {{- include "sandcastle.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-postgres
  labels:
    {{- include "sandcastle.labels" . | nindent 4 }}
spec:
  serviceName: {{ $fullname }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: {{ $fullname }}-postgres
  template:
    metadata:
      labels:
        app: {{ $fullname }}-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:{{ .Values.postgresql.image.tag }}
        env:
        - name: POSTGRES_DB
          value: {{ .Values.postgresql.auth.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgresql.auth.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $fullname }}-postgres
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}, "-d", {{ .Values.postgresql.auth.database | quote }}]
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: {{ .Values.postgresql.storage | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-postgres
  labels:
    {{- include "sandcastle.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ $fullname }}-postgres
  ports:
  - port: 5432
    targetPort: 5432
{{- end }}
