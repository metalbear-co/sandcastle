apiVersion: v1
kind: Service
metadata:
  name: {{ include "sandcastle.fullname" . }}
  labels:
    {{- include "sandcastle.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sandcastle.selectorLabels" . | nindent 4 }}
