{{- if .Values.sandbox.k8s.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sandcastle.fullname" . }}
  namespace: {{ .Values.sandbox.k8s.namespace }}
  labels:
    {{- include "sandcastle.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sandcastle.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sandcastle.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
