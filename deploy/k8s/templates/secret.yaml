{{- $dbUrl := include "sandcastle.databaseUrl" . }}
{{- $hasSecrets := or .Values.auth.mcpToken .Values.auth.password .Values.auth.github.clientId .Values.auth.github.clientSecret .Values.auth.google.clientId .Values.auth.google.clientSecret $dbUrl .Values.sandbox.daytona.apiKey .Values.githubApp.appId .Values.githubApp.privateKey .Values.githubApp.installationId }}
{{- if $hasSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sandcastle.fullname" . }}
  labels:
    {{- include "sandcastle.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.auth.mcpToken }}
  MCP_TOKEN: {{ .Values.auth.mcpToken | quote }}
  {{- end }}
  {{- if .Values.auth.password }}
  SANDCASTLE_PASSWORD: {{ .Values.auth.password | quote }}
  {{- end }}
  {{- if .Values.auth.github.clientId }}
  GITHUB_OAUTH_CLIENT_ID: {{ .Values.auth.github.clientId | quote }}
  {{- end }}
  {{- if .Values.auth.github.clientSecret }}
  GITHUB_OAUTH_CLIENT_SECRET: {{ .Values.auth.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.auth.google.clientId }}
  GOOGLE_CLIENT_ID: {{ .Values.auth.google.clientId | quote }}
  {{- end }}
  {{- if .Values.auth.google.clientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.auth.google.clientSecret | quote }}
  {{- end }}
  {{- if $dbUrl }}
  DATABASE_URL: {{ $dbUrl | quote }}
  {{- end }}
  {{- if .Values.sandbox.daytona.apiKey }}
  DAYTONA_API_KEY: {{ .Values.sandbox.daytona.apiKey | quote }}
  {{- end }}
  {{- if .Values.githubApp.appId }}
  GITHUB_APP_ID: {{ .Values.githubApp.appId | quote }}
  {{- end }}
  {{- if .Values.githubApp.privateKey }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.githubApp.privateKey | quote }}
  {{- end }}
  {{- if .Values.githubApp.installationId }}
  GITHUB_APP_INSTALLATION_ID: {{ .Values.githubApp.installationId | quote }}
  {{- end }}
{{- end }}
